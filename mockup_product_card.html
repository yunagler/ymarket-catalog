    <meta charset="UTF-8">

    <title>YMarket - Product Card Mockup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');

        :root {
            --primary: #0A58CA;      /* Tech Royal Blue */
            --primary-hover: #084298;
            --success: #198754;      /* Add to cart success */
            --dark: #212529;         /* Dark text */
            --gray-light: #F8F9FA;   /* Backgrounds */
            --gray-border: #E9ECEF;
            --badge-bg: #FF4757;     /* Hot badge red */
            --club-gold: #D4AF37;    /* Exclusive club */
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: #F0F2F5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Product Card Container */
        .product-card {
            position: relative;
            width: 100%;
            max-width: 280px;
            background: #FFFFFF;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--gray-border);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: #CFE2FF;
        }

        /* Badge */
        .badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--badge-bg);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(255, 71, 87, 0.3);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Image Wrapper */
        .img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; /* 1:1 Aspect Ratio */
            border-radius: 12px;
            background-color: var(--gray-light);
            overflow: hidden;
            margin-bottom: 8px;
        }

        .img-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .img-wrapper img {
            transform: scale(1.08);
        }

        /* Text Content */
        .category {
            font-size: 0.75rem;
            color: #6C757D;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .title {
            font-size: 1.1rem;
            color: var(--dark);
            font-weight: 700;
            line-height: 1.3;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Pricing Area */
        .pricing-zone {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px dashed var(--gray-border);
        }

        .price-retail {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--dark);
        }

        .price-retail span {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6C757D;
        }

        /* The B2B Tease */
        .club-tease {
            font-size: 0.75rem;
            color: #6C757D;
            display: flex;
            align-items: center;
            gap: 4px;
            background: #F8F9FA;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #E9ECEF;
        }
        
        .club-tease i {
            color: #495057;
            font-size: 0.8rem;
        }

        .club-tease a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .club-tease a:hover {
            text-decoration: underline;
        }

        /* Action Area */
        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: auto;
        }

        .btn-add {
            flex: 1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: var(--primary-hover);
        }

        .btn-add:active {
            transform: scale(0.97);
        }

        /* Delivery Badge */
        .delivery-note {
            font-size: 0.7rem;
            color: var(--success);
            font-weight: 700;
            text-align: center;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <div class="badge">🔥 רב מכר</div>
        
        <div class="img-wrapper">
            <!-- Placeholder for actual product image -->
            <img src="https://via.placeholder.com/300x300/F8F9FA/6C757D?text=Nitrile+Gloves+Black" alt="כפפות ניטריל">
        </div>

        <div class="category">בטיחות ומיגון אישי</div>
        <h3 class="title">כפפות ניטריל שחורות XL ללא אבקה (100 יח') - עמידות במיוחד</h3>

        <div class="pricing-zone">

            <div class="club-tease">
                <i>🔒</i> מחיר סיטונאי: <a href="/register">התחבר לצפייה</a>

        </div>

        <div class="actions">

            אספקה ב-72 שעות
        </div>
    </div>
