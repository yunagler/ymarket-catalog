  <!-- Register Form -->
  <div class="container">
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-card__logo">
          <img src="images/logo/logo-hebrew-dark.png" alt="וואי מרקט" height="48">
        </div>
        <h1>הרשמת עסק חדש</h1>

        <form id="registerForm">
          <div class="form-group">
            <label class="form-label" for="reg-business">שם העסק *</label>
            <input type="text" class="form-input" id="reg-business" name="businessName" placeholder="שם החברה / העסק" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-id">מספר ע.מ / ח.פ *</label>
            <input type="text" class="form-input" id="reg-id" name="vatNumber" placeholder="מספר עוסק מורשה או חברה פרטית" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-contact">שם איש קשר *</label>
            <input type="text" class="form-input" id="reg-contact" name="contactName" placeholder="שם מלא" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-phone">טלפון *</label>
            <input type="tel" class="form-input" id="reg-phone" name="phone" placeholder="03-7740400" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">מייל</label>
            <input type="email" class="form-input" id="reg-email" name="email" placeholder="Pm@ymarket.co.il">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-city">עיר</label>
            <input type="text" class="form-input" id="reg-city" name="city" placeholder="עיר / ישוב">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-type">סוג העסק</label>
            <select class="form-select" id="reg-type" name="businessType">
              <option value="">בחרו סוג</option>
              <option value="cleaning">חברת ניקיון</option>
              <option value="restaurant">מסעדה / בית קפה</option>
              <option value="supermarket">סופרמרקט / מכולת</option>
              <option value="distributor">מפיץ / סיטונאי</option>
              <option value="office">משרד / חברת הייטק</option>
              <option value="medical">מוסד רפואי</option>
              <option value="education">מוסד חינוכי</option>
              <option value="sports">מרכז ספורט</option>
              <option value="industrial">מפעל / תעשייה</option>
              <option value="government">גוף ממשלתי / רשות</option>
              <option value="other">אחר</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">סיסמה לפורטל *</label>
            <div style="position: relative;">
              <input type="password" class="form-input" id="reg-password" name="password" placeholder="לפחות 4 תווים" minlength="4" required>
              <button type="button" id="togglePassword" style="position: absolute; left: 4px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-text-light); font-size: var(--fs-base); min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;" aria-label="הצג סיסמה">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <div id="registerError" style="display: none; color: var(--color-danger); font-size: var(--fs-sm); margin-bottom: var(--space-md);"></div>
          <button type="submit" class="btn btn--primary btn--block btn--lg" id="registerBtn">שלחו בקשת הרשמה</button>
        </form>

        <div class="auth-card__footer">
          <p>כבר רשומים? <a href="login.html">כניסה</a></p>

      </div>

  <script src="js/main.min.js"></script>
  <script src="js/analytics.min.js"></script>
  <script>
  (function() {
    const PORTAL_URL = 'https://app.ymarket.co.il';
    const form = document.getElementById('registerForm');
    const errorEl = document.getElementById('registerError');
    const submitBtn = document.getElementById('registerBtn');

    // Password toggle
    const toggleBtn = document.getElementById('togglePassword');
    const passInput = document.getElementById('reg-password');
    if (toggleBtn && passInput) {
      toggleBtn.addEventListener('click', () => {
        const isPassword = passInput.type === 'password';
        passInput.type = isPassword ? 'text' : 'password';
        toggleBtn.querySelector('i').className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
      });
    }

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      const data = new FormData(form);
      const businessName = data.get('businessName').trim();
      const vatNumber = data.get('vatNumber').trim();
      const contactName = data.get('contactName').trim();
      const phone = data.get('phone').trim();
      const password = data.get('password');
      const email = data.get('email').trim();
      const city = data.get('city').trim();

      if (!businessName || !vatNumber || !contactName || !phone || !password) {
        errorEl.textContent = 'נא למלא את כל שדות החובה';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 4) {
        errorEl.textContent = 'סיסמה חייבת להכיל לפחות 4 תווים';
        errorEl.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'שולח...';

      try {
        const res = await fetch(PORTAL_URL + '/api/portal/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            businessName,
            vatNumber,
            contactName,
            phone,
            email: email || undefined,
            city: city || undefined,
            password,
          }),
        });

        const result = await res.json();

        if (!res.ok) {
          errorEl.textContent = result.error || 'שגיאה בשליחת הטופס';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'שלחו בקשת הרשמה';
          return;
        }

        form.innerHTML = `
          <div style="text-align: center; padding: var(--space-xl) 0;">
            <div style="font-size: 48px; color: var(--color-success); margin-bottom: var(--space-md);"><i class="fas fa-check-circle"></i></div>
            <h2 style="margin-bottom: var(--space-sm);">הבקשה נשלחה בהצלחה!</h2>
            <p style="color: var(--color-text-secondary); margin-bottom: var(--space-sm);">ההרשמה שלכם התקבלה וממתינה לאישור.</p>
            <p style="color: var(--color-text-secondary); margin-bottom: var(--space-lg);">לאחר האישור תוכלו להתחבר עם מספר ע.מ/ח.פ והסיסמה שבחרתם.</p>
            <a href="index.html" class="btn btn--primary">חזרה לדף הבית</a>
          </div>
        `;
      } catch (err) {
        errorEl.textContent = 'שגיאת תקשורת. ודאו שהפורטל פעיל ונסו שוב.';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'שלחו בקשת הרשמה';
      }
    });
  })();
  </script>
</body>
